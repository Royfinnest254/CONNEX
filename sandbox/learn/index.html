<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNEX Academy</title>
    <!-- Google Fonts: Plus Jakarta Sans for headers, Inter for body, JetBrains Mono for code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- SQL.js WebAssembly library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>

    <style>
        :root {
            --bg-body: #F0F4FA;
            --bg-card: #FFFFFF;
            --border-color: rgba(226, 232, 240, 0.9);
            
            --text-main: #1E293B;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            
            --blue-primary: #0070F3;
            --blue-light: #EBF5FF;
            --blue-glow: rgba(0, 112, 243, 0.15);
            
            --success: #10B981;
            --success-glow: rgba(16, 185, 129, 0.08);
            --error: #EF4444;
            --error-glow: rgba(239, 68, 68, 0.08);
            
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --radius-md: 16px;
            --radius-lg: 24px;
            
            /* Premium Claymorphism Shadow Tokens */
            --clay-shadow-card: 
                9px 9px 16px rgba(163, 177, 198, 0.3), 
                -9px -9px 16px rgba(255, 255, 255, 1),
                inset 3px 3px 7px rgba(255, 255, 255, 0.8),
                inset -3px -3px 7px rgba(163, 177, 198, 0.08);
                
            --clay-shadow-btn: 
                4px 4px 8px rgba(0, 112, 243, 0.2),
                inset 2px 2px 4px rgba(255, 255, 255, 0.45),
                inset -2px -2px 4px rgba(0, 0, 0, 0.15);
                
            --clay-shadow-btn-light: 
                4px 4px 8px rgba(163, 177, 198, 0.25),
                -4px -4px 8px rgba(255, 255, 255, 1),
                inset 2px 2px 4px rgba(255, 255, 255, 0.9),
                inset -2px -2px 4px rgba(163, 177, 198, 0.05);
                
            --clay-shadow-inset:
                inset 3px 3px 6px rgba(163, 177, 198, 0.25),
                inset -3px -3px 6px rgba(255, 255, 255, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        /* ── Header ── */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-img {
            height: 28px;
            object-fit: contain;
        }

        .logo-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .nav-tabs {
            display: flex;
            gap: 0.75rem;
            background: rgba(226, 232, 240, 0.6);
            padding: 0.25rem;
            border-radius: 12px;
            box-shadow: var(--clay-shadow-inset);
        }

        .tab-trigger {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.4rem 1.1rem;
            border-radius: 9px;
            transition: all 0.15s;
        }

        .tab-trigger.active {
            background: #FFFFFF;
            color: var(--blue-primary);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.05);
        }

        .progress-stats {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sqlite-badge {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.35rem 0.65rem;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: var(--clay-shadow-btn-light);
        }

        .sqlite-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.2s;
        }

        .sqlite-badge.active .sqlite-status-dot {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .xp-count {
            background: var(--blue-light);
            border-radius: 10px;
            padding: 0.35rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--blue-primary);
            box-shadow: inset 1px 1px 3px rgba(0, 112, 243, 0.05);
        }

        /* ── Workspace Layout ── */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 260px 1fr;
            height: calc(100vh - 53px);
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* ── Sidebar Roadmap ── */
        .sidebar {
            background: #FFFFFF;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        @media (max-width: 1024px) {
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                max-height: 200px;
            }
        }

        .sidebar-title {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .roadmap-node {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 0.65rem 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--clay-shadow-btn-light);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .roadmap-node:hover:not(.locked) {
            transform: translateY(-2px);
            border-color: rgba(0, 112, 243, 0.25);
        }

        .roadmap-node.active {
            border-color: var(--blue-primary);
            background: var(--blue-light);
            box-shadow: var(--clay-shadow-inset);
        }

        .roadmap-node.locked {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
            background: rgba(226, 232, 240, 0.4);
            border-color: transparent;
        }

        .node-title {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-index {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-right: 0.4rem;
        }

        .node-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            margin-left: 0.5rem;
        }

        .roadmap-node.completed .node-status-dot {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .roadmap-node.active .node-status-dot {
            background: var(--blue-primary);
            box-shadow: 0 0 6px var(--blue-primary);
        }

        /* ── Content Area ── */
        .content-pane {
            height: 100%;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .academy-layout {
            display: flex;
            gap: 1.5rem;
            width: 100%;
            max-width: 1100px;
            align-items: stretch;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .slide-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 100%;
            box-shadow: var(--clay-shadow-card);
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .chapter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .chapter-title-text {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--blue-primary);
        }

        .slide-progress {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .slide-body h2 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .slide-body p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .analogy-box {
            background: var(--blue-light);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--text-secondary);
            border-left: 4px solid var(--blue-primary);
            box-shadow: inset 1px 1px 3px rgba(0, 112, 243, 0.03);
            margin-top: 0.5rem;
        }

        .analogy-label {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--blue-primary);
            margin-bottom: 0.2rem;
        }

        /* ── Code Box ── */
        .code-block {
            background: #FAF8F5;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.65rem 0.85rem;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-main);
            line-height: 1.45;
            margin: 0.5rem 0;
            box-shadow: var(--clay-shadow-inset);
        }

        /* ── Quiz Box ── */
        .quiz-box {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }

        .choice-item {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-align: left;
            width: 100%;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 600;
            box-shadow: var(--clay-shadow-btn-light);
        }

        .choice-item:hover {
            transform: translateY(-2px);
            border-color: var(--blue-primary);
            box-shadow: var(--clay-shadow-btn-light), 0 4px 8px rgba(0, 112, 243, 0.05);
        }

        .choice-bullet {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .choice-item.correct {
            background: #ECFDF5 !important;
            border-color: var(--success) !important;
            box-shadow: inset 2px 2px 4px rgba(16, 185, 129, 0.05) !important;
        }

        .choice-item.correct .choice-bullet {
            background: var(--success);
            border-color: var(--success);
            color: #FFFFFF;
        }

        .choice-item.incorrect {
            background: #FEF2F2 !important;
            border-color: var(--error) !important;
            box-shadow: inset 2px 2px 4px rgba(239, 68, 68, 0.05) !important;
        }

        .choice-item.incorrect .choice-bullet {
            background: var(--error);
            border-color: var(--error);
            color: #FFFFFF;
        }

        /* ── Code Editor ── */
        .editor-pane {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            transition: all 0.3s ease;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: #FFFFFF;
            overflow: hidden;
            box-shadow: var(--clay-shadow-card);
        }

        .editor-header {
            background: rgba(250, 251, 253, 0.9);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-title {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .editor-body {
            display: flex;
            min-height: 180px;
            height: 220px;
        }

        .line-numbers {
            width: 32px;
            padding: 0.75rem 0;
            border-right: 1px solid var(--border-color);
            text-align: right;
            padding-right: 0.5rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            user-select: none;
            background: #FAFBFD;
        }

        .editor-textarea {
            flex: 1;
            background: none;
            border: none;
            resize: none;
            padding: 0.75rem;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            line-height: 1.45;
            outline: none;
            white-space: pre;
            overflow-x: auto;
        }

        .editor-footer {
            background: #FAFBFD;
            border-top: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-output {
            background: #0F172A;
            color: #E2E8F0;
            padding: 0.65rem 0.85rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            border-radius: 16px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.4);
            line-height: 1.4;
        }

        .console-line.success { color: var(--success); }
        .console-line.error { color: #FCA5A5; }

        /* ── Buttons ── */
        .btn-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            margin-top: auto;
        }

        .btn {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.45rem 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: var(--blue-primary);
            color: #FFFFFF;
            box-shadow: var(--clay-shadow-btn);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 
                6px 6px 12px rgba(0, 112, 243, 0.35),
                inset 2px 2px 4px rgba(255, 255, 255, 0.5),
                inset -2px -2px 4px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 
                2px 2px 4px rgba(0, 112, 243, 0.15),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4),
                inset 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:disabled {
            background: var(--text-muted);
            opacity: 0.6;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: #FFFFFF;
            color: var(--text-secondary);
            box-shadow: var(--clay-shadow-btn-light);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover:not(:disabled) {
            transform: translateY(-1px);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .btn-outline:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Sandbox Layout ── */
        .sandbox-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 1.5rem;
            height: 100%;
            width: 100%;
            max-width: 1100px;
        }

        @media (max-width: 900px) {
            .sandbox-layout {
                grid-template-columns: 1fr;
            }
            .academy-layout {
                flex-direction: column !important;
            }
            #active-slide-card, #academy-editor-pane {
                max-width: 100% !important;
            }
        }

        .tab-pane {
            display: none;
            width: 100%;
            height: 100%;
        }

        .tab-pane.active {
            display: flex;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-group">
            <img src="./logo.png" alt="CONNEX Logo" class="logo-img" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
            <span class="logo-title">CONNEX Academy</span>
        </a>
        <nav class="nav-tabs">
            <button class="tab-trigger active" onclick="setTab('academy')">Academy</button>
            <button class="tab-trigger" onclick="setTab('sandbox')">Sandbox</button>
        </nav>
        <div class="progress-stats">
            <div class="sqlite-badge" id="db-badge">
                <div class="sqlite-status-dot"></div>
                <span id="db-status-text">SQLite DB</span>
            </div>
            <div class="xp-count" id="xp-display">0 XP</div>
        </div>
    </header>

    <div class="workspace">
        <aside class="sidebar">
            <div class="sidebar-title">Syllabus</div>
            <div id="roadmap-nodes-box" style="display: flex; flex-direction: column; gap: 0.4rem;">
                <!-- Syllabus chapters loaded dynamically -->
            </div>
        </aside>

        <main style="overflow-y: auto; background-color: var(--bg-body); width: 100%;">
            
            <!-- ACADEMY PANEL -->
            <div id="academy-pane" class="tab-pane active">
                <div class="content-pane">
                    <div class="academy-layout">
                        <!-- Left card: Text contents / Quiz checks -->
                        <div class="slide-card" id="active-slide-card" style="flex: 1; max-width: 580px;">
                            <div class="chapter-header">
                                <span class="chapter-title-text" id="slide-subtitle">Chapter 1</span>
                                <span class="slide-progress" id="slide-progress-text">Slide 1 of 4</span>
                            </div>
                            
                            <div class="slide-body" id="slide-body-content">
                                <!-- HTML content loaded dynamically -->
                            </div>

                            <div class="quiz-box" id="slide-quiz-box" style="display: none;">
                                <!-- Quiz choices loaded dynamically -->
                            </div>
                            
                            <div class="btn-group">
                                <button class="btn btn-outline" id="slide-prev-btn" onclick="prevSlide()">Previous</button>
                                <button class="btn btn-primary" id="slide-next-btn" onclick="nextSlide()">Continue</button>
                            </div>
                        </div>

                        <!-- Right card: Shared exercise editor (visible on coding slides only) -->
                        <div class="editor-pane" id="academy-editor-pane" style="display: none; flex: 1; max-width: 500px;">
                            <div class="editor-container">
                                <div class="editor-header">
                                    <div class="editor-title">main.go</div>
                                    <button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.7rem; border-radius: 6px;" onclick="resetExerciseCode()">Reset</button>
                                </div>
                                <div class="editor-body">
                                    <div class="line-numbers" id="exercise-line-numbers">1<br>2<br>3<br>4</div>
                                    <textarea class="editor-textarea" id="exercise-textarea" spellcheck="false" oninput="updateLineNumbers('exercise-textarea', 'exercise-line-numbers')"></textarea>
                                </div>
                                <div class="editor-footer">
                                    <span style="font-size: 0.7rem; color: var(--text-muted);">Compiles locally</span>
                                    <button class="btn btn-primary" onclick="runExerciseCode()" style="padding: 0.35rem 0.85rem; border-radius: 6px;">Run Test</button>
                                </div>
                            </div>
                            <div class="console-output" id="exercise-console" style="height: 100px; overflow-y: auto;">
                                <div class="console-line">Ready to test...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SANDBOX PANEL -->
            <div id="sandbox-pane" class="tab-pane" style="padding: 1.5rem; justify-content: center; align-items: flex-start;">
                <div class="sandbox-layout">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <h2 class="node-title" style="font-size: 1rem; color: var(--text-main);">Practice Coding Sandbox</h2>
                        <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem;">Write custom Go code segments. Select from presets list below:</p>
                        
                        <div style="display: flex; gap: 0.5rem; align-items: center; font-size: 0.75rem; margin-bottom: 0.25rem;">
                            <label style="color: var(--text-secondary); font-weight: 600;">Preset:</label>

    <!-- WebAssembly SQLite client persistence logic -->
    <script>
        let db = null;

        // Initialize SQLite WASM
        if (typeof initSqlJs !== 'undefined') {
            initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` })
                .then(SQL => {
                    const savedBase64 = localStorage.getItem('connex_sqlite_bin');
                    if (savedBase64) {
                        try {
                            const binaryString = atob(savedBase64);
                            const binaryArray = new Uint8Array(binaryString.length);
                            for (let i = 0; i < binaryString.length; i++) {
                                binaryArray[i] = binaryString.charCodeAt(i);
                            }
                            db = new SQL.Database(binaryArray);
                        } catch (e) {
                            console.error("Recreating damaged SQLite file:", e);
                            db = new SQL.Database();
                        }
                    } else {
                        db = new SQL.Database();
                    }

                    // Set minimal configurations to keep the DB size extremely low
                    db.run(`
                        PRAGMA page_size = 512;
                        PRAGMA auto_vacuum = FULL;
                        PRAGMA journal_mode = OFF;
                        PRAGMA temp_store = MEMORY;
                    `);

                    db.run(`
                        CREATE TABLE IF NOT EXISTS progress (
                            id INTEGER PRIMARY KEY,
                            xp INTEGER,
                            chapter_id INTEGER,
                            completed_chapters TEXT
                        );
                    `);

                    const res = db.exec("SELECT COUNT(*) FROM progress");
                    if (res[0].values[0][0] === 0) {
                        db.run("INSERT INTO progress (id, xp, chapter_id, completed_chapters) VALUES (1, 0, 1, '{}')");
                    }
                    db.run("VACUUM;");

                    updateDatabaseBadge(true);
                    loadProgressFromDB();
                })
                .catch(err => {
                    console.warn("SQL.js WASM blocked. Falling back to local storage.", err);
                    updateDatabaseBadge(false);
                    loadProgressFromDB();
                });
        } else {
            setTimeout(() => {
                updateDatabaseBadge(false);
                loadProgressFromDB();
            }, 100);
        }

        function updateDatabaseBadge(isActive) {
            const badge = document.getElementById('db-badge');
            const text = document.getElementById('db-status-text');
            if (isActive) {
                badge.classList.add('active');
                text.innerText = "SQLite DB";
            } else {
                badge.classList.remove('active');
                text.innerText = "Web Storage";
            }
        }

        function saveProgressToDB(xp, chapterId, completedMap) {
            if (db) {
                db.run(`
                    UPDATE progress 
                    SET xp = ?, chapter_id = ?, completed_chapters = ? 
                    WHERE id = 1`, 
                    [xp, chapterId, JSON.stringify(completedMap)]
                );
                
                db.run("VACUUM;"); // Ensure DB is defragmented and shrunk to minimum
                
                const binaryArray = db.export();
                let binaryString = "";
                for (let i = 0; i < binaryArray.length; i++) {
                    binaryString += String.fromCharCode(binaryArray[i]);
                }
                const base64String = btoa(binaryString);
                localStorage.setItem('connex_sqlite_bin', base64String);
            } else {
                localStorage.setItem('connex_xp_fallback', xp);
                localStorage.setItem('connex_chapter_fallback', chapterId);
                localStorage.setItem('connex_completed_fallback', JSON.stringify(completedMap));
            }
        }

        function loadProgressFromDB() {
            if (db) {
                try {
                    const res = db.exec("SELECT xp, chapter_id, completed_chapters FROM progress WHERE id = 1");
                    if (res.length > 0 && res[0].values.length > 0) {
                        userXP = res[0].values[0][0];
                        activeChapterId = res[0].values[0][1];
                        completedNodes = JSON.parse(res[0].values[0][2]);
                    }
                } catch (e) {
                    console.error("Error reading progress, using fallback:", e);
                }
            } else {
                userXP = parseInt(localStorage.getItem('connex_xp_fallback') || '0');
                activeChapterId = parseInt(localStorage.getItem('connex_chapter_fallback') || '1');
                completedNodes = JSON.parse(localStorage.getItem('connex_completed_fallback') || '{"1":false,"2":false,"3":false,"4":false,"5":false,"6":false,"7":false,"8":false}');
            }
            
            updateXPDisplay();
            loadRoadmapNodes();
            loadActiveSlide();
        }

        // Web Audio Synthesized Chime/Buzz Feedback Sound Effects
        function playFeedbackSound(isSuccess) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (isSuccess) {
                    // Success chord/chime: Ascending C5 -> G5
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
                    
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.35);
                } else {
                    // Fail: Low detuned buzz
                    osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
                    
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(90, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.25);
                }
            } catch (e) {
                console.warn("Web Audio Context blocked:", e);
            }
        }
    </script>

                nextBtn.disabled = true;
                nextBtn.innerText = "Continue";
                nextBtn.onclick = nextSlide;
            }
        }

        function selectQuizChoice(index) {
            if (activeSelectedAnswer !== null) return;
            
            document.querySelectorAll('.choice-item').forEach(item => {
                item.style.borderColor = "var(--border-color)";
                item.style.boxShadow = "var(--clay-shadow-btn-light)";
            });
            
            const selected = document.getElementById(`choice-${index}`);
            selected.style.borderColor = "var(--blue-primary)";
            
            activeSelectedAnswer = index;
            document.getElementById('slide-next-btn').disabled = false;
        }

        function submitQuizAnswer() {
            const slide = courseData[activeChapterId].slides[activeSlideIndex];
            const selectedItem = document.getElementById(`choice-${activeSelectedAnswer}`);
            const nextBtn = document.getElementById('slide-next-btn');
            
            if (activeSelectedAnswer === slide.correctIndex) {
                selectedItem.classList.add('correct');
                playFeedbackSound(true);
                userXP += 100;
                updateXPDisplay();
                nextBtn.disabled = false;
                nextBtn.innerText = "Continue";
                nextBtn.onclick = nextSlide;
            } else {
                selectedItem.classList.add('incorrect');
                const correctItem = document.getElementById(`choice-${slide.correctIndex}`);
                if (correctItem) correctItem.classList.add('correct');
                playFeedbackSound(false);
                nextBtn.disabled = true;
                setTimeout(() => {
                    loadActiveSlide();
                }, 1600);
            }
        }

        function resetExerciseCode() {
            const slide = courseData[activeChapterId].slides[activeSlideIndex];
            document.getElementById('exercise-textarea').value = slide.template;
            document.getElementById('exercise-console').innerHTML = '<div class="console-line">Ready to test...</div>';
            updateLineNumbers('exercise-textarea', 'exercise-line-numbers');
        }

        function runExerciseCode() {
            const slide = courseData[activeChapterId].slides[activeSlideIndex];
            const code = document.getElementById('exercise-textarea').value;
            const res = slide.validate(code);
            const consoleBox = document.getElementById('exercise-console');
            
            if (res.ok) {
                consoleBox.innerHTML = `<div class="console-line success">${res.msg}</div>`;
                playFeedbackSound(true);
                userXP += 150;
                updateXPDisplay();
                document.getElementById('slide-next-btn').disabled = false;
            } else {
                consoleBox.innerHTML = `<div class="console-line error"># compilation error\n${res.msg}</div>`;
                playFeedbackSound(false);
            }
        }

        function prevSlide() {
            if (activeSlideIndex > 0) {
                activeSlideIndex--;
                loadActiveSlide();
            }
        }

        function nextSlide() {
            const chapter = courseData[activeChapterId];
            if (activeSlideIndex < chapter.slides.length - 1) {
                activeSlideIndex++;
                loadActiveSlide();
            } else {
                completedNodes[activeChapterId] = true;
                if (activeChapterId < 8) {
                    activeChapterId++;
                    activeSlideIndex = 0;
                }
                loadRoadmapNodes();
                loadActiveSlide();
                updateXPDisplay();
            }
        }

        function updateLineNumbers(textareaId, numbersId) {
            const textarea = document.getElementById(textareaId);
            const numBox = document.getElementById(numbersId);
            const linesCount = textarea.value.split('\n').length;
            
            let linesHTML = '';
            for (let i = 1; i <= Math.max(linesCount, 4); i++) {
                linesHTML += i + '<br>';
            }
            numBox.innerHTML = linesHTML;
        }

        /* ── Sandbox Logic ── */
        const sandboxTemplates = {
            hello: `package main\n\nimport "fmt"\n\nfunc main() {\n    fmt.Println("Sandbox connection online.")\n}`,
            pointer: `package main\n\nimport "fmt"\n\nfunc main() {\n    count := 10\n    ptr := &count\n    fmt.Println("Address:", ptr)\n    fmt.Println("Value:", *ptr)\n}`,
            struct: `package main\n\nimport (\n    "encoding/json"\n    "fmt"\n)\n\ntype Asset struct {\n    Name  string \`json:"asset_name"\`\n    Value int    \`json:"asset_value"\`\n}\n\nfunc main() {\n    a := Asset{Name: "Witness Key", Value: 250}\n    b, _ := json.Marshal(a)\n    fmt.Println(string(b))\n}`,
            errors: `package main\n\nimport (\n    "errors"\n    "fmt"\n)\n\nfunc main() {\n    err := errors.New("database locked")\n    wrapped := fmt.Errorf("read failed: %w", err)\n    fmt.Println("Error:", wrapped)\n    fmt.Println("Is target?", errors.Is(wrapped, err))\n}`,
            concurrency: `package main\n\nimport (\n    "fmt"\n    "time"\n)\n\nfunc main() {\n    ch := make(chan string, 1)\n    ch <- "Signal"\n    \n    select {\n    case m := <-ch:\n        fmt.Println("Channel message:", m)\n    case <-time.After(100 * time.Millisecond):\n        fmt.Println("Timeout")\n    }\n}`
        };

        function loadSandboxTemplate() {
            const key = document.getElementById('sandbox-template-select').value;
            document.getElementById('sandbox-textarea').value = sandboxTemplates[key];
            updateLineNumbers('sandbox-textarea', 'sandbox-line-numbers');
        }

        function resetSandboxCode() {
            loadSandboxTemplate();
        }

        function runSandboxCode() {
            const code = document.getElementById('sandbox-textarea').value;
            const consoleBox = document.getElementById('sandbox-console-box');
            
            consoleBox.innerHTML = '<div class="console-line">Compiling...</div>';
            
            setTimeout(() => {
                if (!code.includes("package main")) {
                    consoleBox.innerHTML += '<div class="console-line error"># compilation error\nmain.go:1: expected package main</div>';
                    playFeedbackSound(false);
                    return;
                }
                
                if (code.includes("import") && !code.includes('"')) {
                    consoleBox.innerHTML += '<div class="console-line error"># compilation error\nmain.go:3: imports must use double quotes</div>';
                    playFeedbackSound(false);
                    return;
                }

                if (!code.includes("func main()")) {
                    consoleBox.innerHTML += '<div class="console-line error"># compilation error\nruntime: missing main function entry point</div>';
                    playFeedbackSound(false);
                    return;
                }

                let out = "=== Executing program ===\n";
                if (code.includes("Sandbox connection online.")) {
                    out += "Sandbox connection online.\n";
                } else if (code.includes("ptr :=") && code.includes("*ptr")) {
                    out += "Address: 0xc0000140b2\nValue: 10\n";
                } else if (code.includes("json.Marshal")) {
                    out += '{"asset_name":"Witness Key","asset_value":250}\n';
                } else if (code.includes("errors.Is")) {
                    out += "Error: read failed: database locked\nIs target? true\n";
                } else if (code.includes("Channel message:")) {
                    out += "Channel message: Signal\n";
                } else {
                    out += "Process finished with exit code 0\n";
                }
                
                consoleBox.innerHTML = `<div class="console-line success">${out}</div>`;
                playFeedbackSound(true);
            }, 600);
        }

        // Initially load sandbox template
        loadSandboxTemplate();
    </script>
</body>
</html>
